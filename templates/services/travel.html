{% extends 'base.html' %}
{% block content %}
<div style="margin-bottom: 20px;">
    <a href="{{ url_for('dashboard.home') }}" class="btn btn-secondary" style="padding: 8px 16px;"><i class="fa-solid fa-arrow-left"></i> Back</a>
</div>

<div class="glass-panel" style="max-width: 700px; margin: 0 auto; background: linear-gradient(to bottom right, rgba(30,41,59,0.8), rgba(15,23,42,0.9));">
    
    <div style="display: flex; gap: 15px; margin-bottom: 30px;">
        <div style="flex: 1; text-align: center; padding: 15px; background: var(--primary); border-radius: 12px; cursor: pointer;">
            <i class="fa-solid fa-plane" style="font-size: 1.5rem; margin-bottom: 5px;"></i><br>Flights
        </div>
        <div style="flex: 1; text-align: center; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; cursor: pointer;">
            <i class="fa-solid fa-train" style="font-size: 1.5rem; margin-bottom: 5px;"></i><br>Trains
        </div>
        <div style="flex: 1; text-align: center; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; cursor: pointer;">
            <i class="fa-solid fa-bus" style="font-size: 1.5rem; margin-bottom: 5px;"></i><br>Buses
        </div>
        <div style="flex: 1; text-align: center; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; cursor: pointer;">
            <i class="fa-solid fa-film" style="font-size: 1.5rem; margin-bottom: 5px;"></i><br>Movies
        </div>
    </div>

    <form method="POST" action="{{ url_for('services.travel') }}">
        <div style="display: flex; gap: 20px;">
            <div class="form-group" style="flex: 1;">
                <label>From</label>
                <input type="text" class="form-control" placeholder="Origin City" required>
            </div>
            <div style="display: flex; align-items: center; justify-content: center; margin-top: 10px;">
                <i class="fa-solid fa-arrow-right-arrow-left text-muted" style="cursor: pointer;"></i>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>To</label>
                <input type="text" name="destination" class="form-control" placeholder="Destination City" required>
            </div>
        </div>

        <div style="display: flex; gap: 20px;">
            <div class="form-group" style="flex: 1;">
                <label>Departure Date</label>
                <input type="date" class="form-control" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Passengers & Class</label>
                <select class="form-control" style="appearance: none; background-color: rgba(15, 23, 42, 0.6);" required>
                    <option>1 Adult, Economy</option>
                    <option>2 Adults, Economy</option>
                    <option>1 Adult, Business</option>
                </select>
            </div>
        </div>

        <div style="margin: 20px 0; padding: 15px; background: rgba(16, 185, 129, 0.1); border-left: 4px solid var(--success); border-radius: 4px;">
            <p style="margin: 0; color: var(--success);"><i class="fa-solid fa-tag"></i> <strong>Special Offer!</strong> Flat Mock Fare: ₹5000 for any destination.</p>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 15px;">Search & Book Flights</button>
    </form>
</div>
{% endblock %}
